# Fly.io alternative. `fly launch --copy-config --name ligato-ai-vision` from backend/
app = "ligato-ai-vision"
primary_region = "sea"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[env]
  VISION_MODEL = "claude-sonnet-4-6"
  VOICE_MODEL = "claude-sonnet-4-6"
  BUSINESS_NAME = "Summit Plumbing Co."
  BUSINESS_HOURS = "Mon-Fri 8am-6pm; Sat 8am-2pm"
  AFTER_HOURS_RATE = "$250 emergency trip fee"

# Secrets (set with `fly secrets set KEY=value`):
#   ANTHROPIC_API_KEY, TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN, TWILIO_PHONE_NUMBER, PUBLIC_BASE_URL
