# One-click Render.com deploy.
# In Render: New → Blueprint → point at this repo, choose the `backend/` subdir.
# It'll pick up this file automatically.
services:
  - type: web
    name: ligato-ai-vision
    runtime: docker
    rootDir: backend
    plan: starter
    region: oregon
    healthCheckPath: /
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: VISION_MODEL
        value: claude-sonnet-4-6
      - key: VOICE_MODEL
        value: claude-sonnet-4-6
      - key: BUSINESS_NAME
        value: Summit Plumbing Co.
      - key: BUSINESS_HOURS
        value: Mon-Fri 8am-6pm; Sat 8am-2pm
      - key: AFTER_HOURS_RATE
        value: $250 emergency trip fee
